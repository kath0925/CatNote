<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Object-oriented design class diagram example</title>
  <desc id="desc">A UML class diagram for a simple 2D game project showing inheritance, composition, aggregation, association, and interface realization.</desc>
  <defs>
    <marker id="inherit" viewBox="0 0 18 14" refX="17" refY="7" markerWidth="18" markerHeight="14" orient="auto">
      <path d="M 17 7 L 1 1 L 1 13 Z" fill="#ffffff" stroke="#1f2937" stroke-width="1.8"/>
    </marker>
    <marker id="diamondFilled" viewBox="0 0 18 14" refX="17" refY="7" markerWidth="18" markerHeight="14" orient="auto">
      <path d="M 17 7 L 9 1 L 1 7 L 9 13 Z" fill="#1f2937" stroke="#1f2937" stroke-width="1.6"/>
    </marker>
    <marker id="diamondOpen" viewBox="0 0 18 14" refX="17" refY="7" markerWidth="18" markerHeight="14" orient="auto">
      <path d="M 17 7 L 9 1 L 1 7 L 9 13 Z" fill="#ffffff" stroke="#1f2937" stroke-width="1.6"/>
    </marker>
    <style>
      .canvas { fill: #f8fafc; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .interface { fill: #eef6ff; stroke: #1f2937; stroke-width: 2; rx: 8; }
      .header { fill: #dbeafe; stroke: #1f2937; stroke-width: 2; }
      .header-entity { fill: #dcfce7; stroke: #1f2937; stroke-width: 2; }
      .header-service { fill: #fef3c7; stroke: #1f2937; stroke-width: 2; }
      .divider { stroke: #1f2937; stroke-width: 1.5; }
      .line { fill: none; stroke: #1f2937; stroke-width: 2; }
      .dash { fill: none; stroke: #1f2937; stroke-width: 2; stroke-dasharray: 8 6; }
      .label { font: 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 13px Arial, Helvetica, sans-serif; fill: #374151; }
      .title { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .italic { font: italic 15px Arial, Helvetica, sans-serif; fill: #111827; }
      .caption { font: 700 22px Arial, Helvetica, sans-serif; fill: #111827; }
    </style>
  </defs>

  <rect class="canvas" width="1280" height="900"/>
  <text x="40" y="44" class="caption">Class Diagram Example for a 2D Game</text>
  <text x="40" y="70" class="small">Based on the OO design notes: abstraction, encapsulation, inheritance, polymorphism, composition, aggregation, multiplicity, and navigability.</text>

  <!-- Entity hierarchy -->
  <g transform="translate(500 110)">
    <rect class="box" width="280" height="165"/>
    <rect class="header-entity" width="280" height="38"/>
    <text x="140" y="25" text-anchor="middle" class="title">&lt;&lt;abstract&gt;&gt; Entity</text>
    <line class="divider" x1="0" y1="38" x2="280" y2="38"/>
    <text x="16" y="64" class="label">- x: number</text>
    <text x="16" y="86" class="label">- y: number</text>
    <text x="16" y="108" class="label">- velocity: Vector</text>
    <line class="divider" x1="0" y1="122" x2="280" y2="122"/>
    <text x="16" y="147" class="label">+ update(dt): void</text>
    <text x="16" y="169" class="label">+ render(): void</text>
  </g>

  <g transform="translate(230 345)">
    <rect class="box" width="250" height="160"/>
    <rect class="header-entity" width="250" height="38"/>
    <text x="125" y="25" text-anchor="middle" class="title">Player</text>
    <line class="divider" x1="0" y1="38" x2="250" y2="38"/>
    <text x="16" y="64" class="label">- health: number</text>
    <text x="16" y="86" class="label">- score: number</text>
    <line class="divider" x1="0" y1="100" x2="250" y2="100"/>
    <text x="16" y="125" class="label">+ handleInput(): void</text>
    <text x="16" y="147" class="label">+ shoot(): Projectile</text>
  </g>

  <g transform="translate(520 345)">
    <rect class="box" width="240" height="140"/>
    <rect class="header-entity" width="240" height="38"/>
    <text x="120" y="25" text-anchor="middle" class="title">Enemy</text>
    <line class="divider" x1="0" y1="38" x2="240" y2="38"/>
    <text x="16" y="64" class="label">- damage: number</text>
    <line class="divider" x1="0" y1="78" x2="240" y2="78"/>
    <text x="16" y="103" class="label">+ update(dt): void</text>
    <text x="16" y="125" class="label">+ attack(player): void</text>
  </g>

  <g transform="translate(800 345)">
    <rect class="box" width="250" height="140"/>
    <rect class="header-entity" width="250" height="38"/>
    <text x="125" y="25" text-anchor="middle" class="title">Projectile</text>
    <line class="divider" x1="0" y1="38" x2="250" y2="38"/>
    <text x="16" y="64" class="label">- damage: number</text>
    <text x="16" y="86" class="label">- owner: Entity</text>
    <line class="divider" x1="0" y1="100" x2="250" y2="100"/>
    <text x="16" y="125" class="label">+ onHit(target): void</text>
  </g>

  <path class="line" d="M 355 345 L 355 305 L 640 305 L 640 275" marker-end="url(#inherit)"/>
  <path class="line" d="M 640 345 L 640 275" marker-end="url(#inherit)"/>
  <path class="line" d="M 925 345 L 925 305 L 640 305 L 640 275" marker-end="url(#inherit)"/>

  <!-- Player components -->
  <g transform="translate(50 590)">
    <rect class="box" width="230" height="110"/>
    <rect class="header-service" width="230" height="38"/>
    <text x="115" y="25" text-anchor="middle" class="title">MovementController</text>
    <line class="divider" x1="0" y1="38" x2="230" y2="38"/>
    <text x="16" y="64" class="label">+ move(input): void</text>
    <text x="16" y="86" class="label">+ jump(): void</text>
  </g>

  <g transform="translate(310 590)">
    <rect class="box" width="210" height="110"/>
    <rect class="header-service" width="210" height="38"/>
    <text x="105" y="25" text-anchor="middle" class="title">StressMeter</text>
    <line class="divider" x1="0" y1="38" x2="210" y2="38"/>
    <text x="16" y="64" class="label">- value: number</text>
    <text x="16" y="86" class="label">+ increase(amount): void</text>
  </g>

  <g transform="translate(560 590)">
    <rect class="box" width="220" height="110"/>
    <rect class="header-service" width="220" height="38"/>
    <text x="110" y="25" text-anchor="middle" class="title">Inventory</text>
    <line class="divider" x1="0" y1="38" x2="220" y2="38"/>
    <text x="16" y="64" class="label">- items: Item[]</text>
    <text x="16" y="86" class="label">+ add(item): void</text>
  </g>

  <g transform="translate(840 612)">
    <rect class="box" width="170" height="78"/>
    <rect class="header-service" width="170" height="34"/>
    <text x="85" y="23" text-anchor="middle" class="title">Item</text>
    <line class="divider" x1="0" y1="34" x2="170" y2="34"/>
    <text x="16" y="59" class="label">+ use(): void</text>
  </g>

  <path class="line" d="M 232 505 L 165 505 L 165 590" marker-end="url(#diamondFilled)"/>
  <path class="line" d="M 355 505 L 415 505 L 415 590" marker-end="url(#diamondFilled)"/>
  <path class="line" d="M 478 505 L 670 505 L 670 590" marker-end="url(#diamondFilled)"/>
  <text x="184" y="526" class="small">1</text>
  <text x="432" y="526" class="small">1</text>
  <text x="686" y="526" class="small">1</text>
  <path class="line" d="M 780 646 L 840 646" marker-end="url(#diamondOpen)"/>
  <text x="792" y="638" class="small">0..*</text>

  <!-- Level model -->
  <g transform="translate(70 120)">
    <rect class="box" width="250" height="150"/>
    <rect class="header" width="250" height="38"/>
    <text x="125" y="25" text-anchor="middle" class="title">Level</text>
    <line class="divider" x1="0" y1="38" x2="250" y2="38"/>
    <text x="16" y="64" class="label">- name: string</text>
    <text x="16" y="86" class="label">- difficulty: number</text>
    <line class="divider" x1="0" y1="100" x2="250" y2="100"/>
    <text x="16" y="125" class="label">+ load(): void</text>
    <text x="16" y="147" class="label">+ update(dt): void</text>
  </g>

  <g transform="translate(80 345)">
    <rect class="box" width="110" height="84"/>
    <rect class="header" width="110" height="34"/>
    <text x="55" y="23" text-anchor="middle" class="title">Tile</text>
    <line class="divider" x1="0" y1="34" x2="110" y2="34"/>
    <text x="12" y="59" class="label">- type</text>
  </g>

  <g transform="translate(80 460)">
    <rect class="box" width="130" height="84"/>
    <rect class="header" width="130" height="34"/>
    <text x="65" y="23" text-anchor="middle" class="title">Hazard</text>
    <line class="divider" x1="0" y1="34" x2="130" y2="34"/>
    <text x="12" y="59" class="label">+ trigger()</text>
  </g>

  <path class="line" d="M 135 270 L 135 345" marker-end="url(#diamondFilled)"/>
  <text x="147" y="320" class="small">0..*</text>
  <path class="line" d="M 205 270 L 205 460" marker-end="url(#diamondOpen)"/>
  <text x="217" y="438" class="small">0..*</text>
  <path class="line" d="M 320 195 L 500 195"/>
  <text x="350" y="185" class="small">contains 0..*</text>

  <!-- Interactable model -->
  <g transform="translate(1010 120)">
    <rect class="interface" width="230" height="118"/>
    <rect class="header" width="230" height="38"/>
    <text x="115" y="20" text-anchor="middle" class="italic">&lt;&lt;interface&gt;&gt;</text>
    <text x="115" y="35" text-anchor="middle" class="title">Interactable</text>
    <line class="divider" x1="0" y1="38" x2="230" y2="38"/>
    <text x="16" y="64" class="label">+ update(dt): void</text>
    <text x="16" y="86" class="label">+ render(): void</text>
    <text x="16" y="108" class="label">+ onPlayerCollide(p): void</text>
  </g>

  <g transform="translate(1080 300)">
    <rect class="box" width="150" height="74"/>
    <rect class="header" width="150" height="34"/>
    <text x="75" y="23" text-anchor="middle" class="title">Door</text>
    <line class="divider" x1="0" y1="34" x2="150" y2="34"/>
    <text x="16" y="58" class="label">+ open()</text>
  </g>

  <g transform="translate(1080 410)">
    <rect class="box" width="150" height="74"/>
    <rect class="header" width="150" height="34"/>
    <text x="75" y="23" text-anchor="middle" class="title">Button</text>
    <line class="divider" x1="0" y1="34" x2="150" y2="34"/>
    <text x="16" y="58" class="label">+ press()</text>
  </g>

  <g transform="translate(1060 520)">
    <rect class="box" width="190" height="84"/>
    <rect class="header-entity" width="190" height="34"/>
    <text x="95" y="23" text-anchor="middle" class="title">MovingPlatform</text>
    <line class="divider" x1="0" y1="34" x2="190" y2="34"/>
    <text x="16" y="59" class="label">+ moveAlongPath()</text>
  </g>

  <path class="dash" d="M 1155 300 L 1155 238" marker-end="url(#inherit)"/>
  <path class="dash" d="M 1155 410 L 1155 238" marker-end="url(#inherit)"/>
  <path class="dash" d="M 1155 520 L 1155 238" marker-end="url(#inherit)"/>
  <path class="line" d="M 1060 562 L 925 562 L 925 485" marker-end="url(#inherit)"/>
  <path class="line" d="M 320 238 L 1010 178"/>
  <text x="730" y="188" class="small">manages 0..*</text>

  <!-- Legend -->
  <g transform="translate(50 760)">
    <rect class="box" width="1180" height="95"/>
    <text x="20" y="31" class="title">Legend</text>
    <path class="line" d="M 120 28 L 210 28" marker-end="url(#inherit)"/>
    <text x="225" y="33" class="small">Generalization / inheritance: Player is an Entity</text>
    <path class="line" d="M 120 58 L 210 58" marker-end="url(#diamondFilled)"/>
    <text x="225" y="63" class="small">Composition: part lifetime depends on the whole</text>
    <path class="line" d="M 585 58 L 675 58" marker-end="url(#diamondOpen)"/>
    <text x="690" y="63" class="small">Aggregation: weak whole-part relationship</text>
    <path class="dash" d="M 585 28 L 675 28" marker-end="url(#inherit)"/>
    <text x="690" y="33" class="small">Realization: class implements interface</text>
  </g>
</svg>
